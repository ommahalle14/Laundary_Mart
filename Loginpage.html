<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="Loginpage.css">
</head>
<body>
    <div class="container">
        <div class="box" id="Left" ><img width="350" style="border-radius: 10vh;" src="images/image.png" alt=""></div>
        <div class="box" id="Right" >
            <form id="form" action="">
                <h1 id="logintitle">Welcome Back <br>to Laundry Mart</h1>
                <p id="loginp">Your trusted partner for professional <br> laundry and dry-cleaning services.</p>
                <label id="fl" for="email">Email</label>
                <input id="ff" placeholder="Email@123" type="email" required/>
                <br>
                <label id="fl" for="password" >Password</label>
                <input id="ff" placeholder="Password" type="password" required>
                <br>
                <a id="an" href="" target="_blank">Forget password</a>
                <br>
                <button id="btn">Login</button>
                <p id="signupp">Not a Member ? No problem <a href="">SignUp</a> </p>
            </form>
        </div>
    </div>
</body>
</html>
