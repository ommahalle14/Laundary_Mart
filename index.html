<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="Loginpage.css">
</head>
<body>
    <div class="container">
        <div class="box" id="Left" ><img width="350vh" src="images/image.png" alt=""></div>
        <div class="box" id="Right" >
            <form id="form" action="">
                <h1 id="logintitle">Welcome Back <br>to Laundry Mart</h1>
                <p id="loginp">Your trusted partner for professional <br> laundry and dry-cleaning services.</p>
                <label for="email">Email</label>
                <input placeholder="Email@123" type="email"/>
                <br>
                <label for="password" >Password</label>
                <input placeholder="Password" type="password">
                <br>
                <a href="">Forget password</a>
                <br>
                <button>Login</button>
            </form>
        </div>
    </div>
</body>
</html>
